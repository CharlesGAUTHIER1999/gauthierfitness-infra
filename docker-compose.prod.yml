# ════════════════════════════════════════════════════════════════════
#  GauthierFitness - Production override
#  Usage : docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#  Do not redefine images here : docker-compose.yml already has the right names
# ════════════════════════════════════════════════════════════════════

services:

  nginx:
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/prod.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - backend_storage:/var/www/html/storage:ro
    restart: always

  backend:
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      LOG_CHANNEL: stderr
    restart: always

  frontend:
    restart: always

  db:
    restart: always

  redis:
    restart: always

  queue:
    restart: always
