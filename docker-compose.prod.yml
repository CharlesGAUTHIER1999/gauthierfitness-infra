# ════════════════════════════════════════════════════════════════════
#  GauthierFitness — Production Override
#  Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#  ⚠  Variables sensibles via GitHub Secrets → injectées par le pipeline CI/CD
# ════════════════════════════════════════════════════════════════════

services:

  nginx:
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro  # certificats SSL OVH
      - backend_storage:/var/www/html/storage:ro
    restart: always

  backend:
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      LOG_CHANNEL: stderr
    restart: always

  frontend:
    restart: always

  db:
    ports: []                 # base non exposée en prod
    restart: always

  redis:
    ports: []                 # redis non exposé en prod
    restart: always

  queue:
    restart: always