upstream backend {
    server backend:9000;
}

upstream frontend {
    server frontend:80;
}

# ─── HTTP → HTTPS (hostnames staging) ────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name staging.gauthierfitness.fr api-staging.gauthierfitness.fr;
    return 301 https://$host$request_uri;
}

# ─── FRONT staging : staging.gauthierfitness.fr ──────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name staging.gauthierfitness.fr;

    ssl_certificate     /etc/letsencrypt/live/staging.gauthierfitness.fr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/staging.gauthierfitness.fr/privkey.pem;

    # ─── API → Laravel FPM (même origine) ────────────────────────────
    location /api/ {
        fastcgi_pass backend;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME /var/www/html/public/index.php;
        include fastcgi_params;
        fastcgi_param HTTP_HOST $host;
        fastcgi_param HTTPS on;
        fastcgi_read_timeout 200;
    }

    location ~ ^/(sanctum|up)(/|$) {
        fastcgi_pass backend;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME /var/www/html/public/index.php;
        include fastcgi_params;
        fastcgi_param HTTP_HOST $host;
        fastcgi_param HTTPS on;
        fastcgi_read_timeout 200;
    }

    # ─── Storage / images produits ───────────────────────────────────
    location /storage/ {
        alias /var/www/html/storage/app/public/;
        add_header Cache-Control "public, max-age=31536000";
        try_files $uri $uri/ =404;
    }

    # ─── Front SPA ────────────────────────────────────────────────────
    location / {
        proxy_pass http://frontend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 1024;

    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header Referrer-Policy "strict-origin-when-cross-origin";
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'wasm-unsafe-eval' https://js.stripe.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; font-src 'self' data:; frame-src https://js.stripe.com https://hooks.stripe.com; connect-src 'self' blob: https://api.stripe.com https://*.sentry.io https://*.ingest.sentry.io https://*.ingest.us.sentry.io https://*.ingest.de.sentry.io; object-src 'none'; base-uri 'self'; frame-ancestors 'self';" always;
}

# ─── API staging : api-staging.gauthierfitness.fr (sous-domaine) ─────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name api-staging.gauthierfitness.fr;

    ssl_certificate     /etc/letsencrypt/live/staging.gauthierfitness.fr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/staging.gauthierfitness.fr/privkey.pem;

    location / {
        fastcgi_pass backend;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME /var/www/html/public/index.php;
        include fastcgi_params;
        fastcgi_param HTTP_HOST $host;
        fastcgi_param HTTPS on;
        fastcgi_read_timeout 200;
    }

    location /storage/ {
        alias /var/www/html/storage/app/public/;
        add_header Cache-Control "public, max-age=31536000";
        try_files $uri $uri/ =404;
    }

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
}
