# ════════════════════════════════════════════════════════════════════
#  GauthierFitness - Staging override (HTTPS)
#  Usage : docker compose -f docker-compose.yml -f docker-compose.staging.yml up -d
# ════════════════════════════════════════════════════════════════════

services:

  nginx:
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/staging.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - backend_storage:/var/www/html/storage:ro
    restart: always

  backend:
    restart: always

  frontend:
    restart: always

  db:
    restart: always

  redis:
    restart: always

  queue:
    restart: always

  scheduler:
    restart: always
