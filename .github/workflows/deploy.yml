# ════════════════════════════════════════════════════════════════════
#  GauthierFitness - Deploy pipeline
#  repo: CharlesGAUTHIER1999/gauthierfitness-infra
#
#  Triggered :
#    - Manually (workflow_dispatch) with an image choice
#    - Automatically via repository_dispatch from the backend/frontend CI
#
#  Sequence : Deploy Staging → E2E Tests → Deploy Prod (manual gate)
#  Or       : Deploy Prod directly (prod-only)
# ════════════════════════════════════════════════════════════════════

name: Deploy Pipeline

on:
  # Manual trigger from GitHub UI
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Tag de l'image Docker (ex: latest, develop, sha-abc123)"
        required: true
        default: "develop"
      environment:
        description: "Cible de déploiement"
        required: true
        default: "staging"
        type: choice
        options: [staging, prod-only, both]

  # Automatic trigger from backend/frontend CI
  repository_dispatch:
    types: [deploy-staging]

env:
  IMAGE_TAG: ${{ github.event.inputs.image_tag || github.event.client_payload.image_tag || 'develop' }}

# ──────────────────────────────────────────────────────────────────
# JOB 1 - Staging deployment
# ──────────────────────────────────────────────────────────────────
jobs:
  deploy-staging:
    name: "Staging Deployment"
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'repository_dispatch' ||
      github.event.inputs.environment == 'staging' ||
      github.event.inputs.environment == 'both'

    environment:
      name: staging
      url: ${{ vars.STAGING_URL }}

    steps:
      - name: Checkout infra
        uses: actions/checkout@v4

      - name: Préparer la clé SSH
        run: |
          echo "${{ secrets.STAGING_SSH_KEY }}" | base64 -d > $RUNNER_TEMP/staging_key
          chmod 644 $RUNNER_TEMP/staging_key

      - name: Copier docker-compose + nginx vers VPS
        uses: appleboy/scp-action@v1.0.0
        with:
          host: ${{ secrets.STAGING_SSH_HOST }}
          username: ${{ secrets.STAGING_SSH_USER }}
          key_path: /github/runner_temp/staging_key
          port: ${{ secrets.STAGING_SSH_PORT || '22' }}
          source: "docker-compose.yml,docker-compose.staging.yml,nginx/"
          target: "/var/www/gauthierfitness-staging/"

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.STAGING_SSH_HOST }}
          username: ${{ secrets.STAGING_SSH_USER }}
          key_path: ${{ runner.temp }}/staging_key
          port: ${{ secrets.STAGING_SSH_PORT || 22 }}
          envs: IMAGE_TAG
          script: |
            set -e
            cd /var/www/gauthierfitness-staging

            # GHCR authentication
            echo "${{ secrets.GHCR_TOKEN }}" | \
              docker login ghcr.io -u CharlesGAUTHIER1999 --password-stdin

            # Staging override (HTTPS) applied to every command
            DC="docker compose -f docker-compose.yml -f docker-compose.staging.yml"

            # Pull new images
            export IMAGE_TAG=$IMAGE_TAG
            $DC pull

            # Migrations
            $DC run --rm backend php artisan migrate --force

            # Restart
            $DC up -d --remove-orphans

            # Restart nginx too: it caches the "backend" container's Docker-network
            # IP at its own startup, and won't notice "backend" was just recreated
            # above (site-wide 502 until nginx itself is restarted).
            $DC restart nginx

            # Optimizations
            sleep 5
            $DC exec -T backend php artisan config:cache
            $DC exec -T backend php artisan route:cache
            $DC exec -T backend php artisan view:cache

            # Clean up
            docker image prune -f

            echo "Staging deployed - tag: $IMAGE_TAG - $(date)"

  # ──────────────────────────────────────────────────────────────────
  # JOB 2 - Cypress E2E tests
  # ──────────────────────────────────────────────────────────────────
  e2e:
    name: "Tests E2E Cypress"
    runs-on: ubuntu-latest
    needs: deploy-staging
    if: needs.deploy-staging.result == 'success'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: e2e/package-lock.json

      - name: Cypress run
        uses: cypress-io/github-action@v6
        with:
          working-directory: e2e
          browser: chrome
          install-command: npm ci
        env:
          CYPRESS_BASE_URL: ${{ vars.STAGING_URL }}
          BASE_URL: ${{ vars.STAGING_URL }}
          TEST_ADMIN_EMAIL: ${{ secrets.TEST_ADMIN_EMAIL }}
          TEST_ADMIN_PASSWORD: ${{ secrets.TEST_ADMIN_PASSWORD }}
          TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
          TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}

      - name: Upload screenshots si échec
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: cypress-screenshots-${{ env.IMAGE_TAG }}
          path: e2e/cypress/screenshots/
          retention-days: 30

      - name: Upload vidéos
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cypress-videos-${{ env.IMAGE_TAG }}
          path: e2e/cypress/videos/
          retention-days: 30

  # ──────────────────────────────────────────────────────────────────
  # JOB 3 - Production deployment
  # ──────────────────────────────────────────────────────────────────
  deploy-prod:
    name: "Production Deployment"
    runs-on: ubuntu-latest
    needs: [deploy-staging, e2e]
    if: |
      always() &&
      (
        github.event.inputs.environment == 'prod-only' ||
        (
          (
            github.event.inputs.environment == 'both' ||
            github.event.client_payload.target == 'production'
          ) &&
          needs.e2e.result == 'success'
        )
      )

    environment:
      name: production
      url: ${{ vars.PROD_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Préparer la clé SSH
        run: |
          echo "${{ secrets.PROD_SSH_KEY }}" | base64 -d > $RUNNER_TEMP/prod_key
          chmod 644 $RUNNER_TEMP/prod_key

      - name: Copier fichiers vers VPS prod
        uses: appleboy/scp-action@v1.0.0
        with:
          host: ${{ secrets.PROD_SSH_HOST }}
          username: ${{ secrets.PROD_SSH_USER }}
          key_path: /github/runner_temp/prod_key
          port: ${{ secrets.PROD_SSH_PORT || '22' }}
          source: "docker-compose.yml,docker-compose.prod.yml,nginx/"
          target: "/var/www/gauthierfitness/"

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.PROD_SSH_HOST }}
          username: ${{ secrets.PROD_SSH_USER }}
          key_path: ${{ runner.temp }}/prod_key
          port: ${{ secrets.PROD_SSH_PORT || 22 }}
          envs: IMAGE_TAG
          script: |
            set -e
            cd /var/www/gauthierfitness

            echo "${{ secrets.GHCR_TOKEN }}" | \
              docker login ghcr.io -u CharlesGAUTHIER1999 --password-stdin

            # Deploy via SSH: pull new images, run migrations, restart and warm caches
            export IMAGE_TAG=$IMAGE_TAG
            docker compose -f docker-compose.yml -f docker-compose.prod.yml pull

            docker compose exec -T backend php artisan down --retry=5 || true
            docker compose -f docker-compose.yml -f docker-compose.prod.yml \
              run --rm backend php artisan migrate --force
            docker compose -f docker-compose.yml -f docker-compose.prod.yml \
              up -d --remove-orphans

            # Restart nginx too: it caches the "backend" container's Docker-network
            # IP at its own startup, and won't notice "backend" was just recreated
            # above (site-wide 502 until nginx itself is restarted).
            docker compose -f docker-compose.yml -f docker-compose.prod.yml \
              restart nginx

            sleep 8
            docker compose exec -T backend php artisan config:cache
            docker compose exec -T backend php artisan route:cache
            docker compose exec -T backend php artisan view:cache
            docker compose exec -T backend php artisan up

            docker image prune -f
            echo "Production deployed - tag: $IMAGE_TAG - $(date)"
