# ════════════════════════════════════════════════════════════════════
#  GauthierFitness — Pipeline de déploiement
#  repo : CharlesGAUTHIER1999/gauthierfitness-infra
#
#  Déclenché :
#    - Manuellement (workflow_dispatch) avec choix de l'image
#    - Automatiquement via repository_dispatch depuis backend/frontend CI
#
#  Séquence : Deploy Staging → Tests E2E → Deploy Prod (gate manuelle)
#  Ou      : Deploy Prod directement (prod-only)
# ════════════════════════════════════════════════════════════════════

name: Deploy Pipeline

on:
  # Déclenchement manuel depuis GitHub UI
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Tag de l'image Docker (ex: latest, develop, sha-abc123)"
        required: true
        default: "develop"
      environment:
        description: "Cible de déploiement"
        required: true
        default: "staging"
        type: choice
        options: [staging, prod-only, both]

  # Déclenchement automatique depuis les CI backend/frontend
  repository_dispatch:
    types: [deploy-staging]

env:
  IMAGE_TAG: ${{ github.event.inputs.image_tag || github.event.client_payload.image_tag || 'develop' }}

# ──────────────────────────────────────────────────────────────────
# JOB 1 — Déploiement Staging
# ──────────────────────────────────────────────────────────────────
jobs:
  deploy-staging:
    name: "🚀 Déploiement Staging"
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'repository_dispatch' ||
      github.event.inputs.environment == 'staging' ||
      github.event.inputs.environment == 'both'

    environment:
      name: staging
      url: ${{ vars.STAGING_URL }}

    steps:
      - name: Checkout infra
        uses: actions/checkout@v4

      - name: Copier docker-compose + nginx vers VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.STAGING_SSH_HOST }}
          username: ${{ secrets.STAGING_SSH_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          port: ${{ secrets.STAGING_SSH_PORT || '22' }}
          source: "docker-compose.yml,nginx/"
          target: "/var/www/gauthierfitness-staging/"

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.STAGING_SSH_HOST }}
          username: ${{ secrets.STAGING_SSH_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          port: ${{ secrets.STAGING_SSH_PORT || 22 }}
          envs: IMAGE_TAG
          script: |
            set -e
            cd /var/www/gauthierfitness-staging

            # Authentification GHCR
            echo "${{ secrets.GHCR_TOKEN }}" | \
              docker login ghcr.io -u CharlesGAUTHIER1999 --password-stdin

            # Pull nouvelles images
            export IMAGE_TAG=$IMAGE_TAG
            docker compose pull

            # Migrations
            docker compose run --rm backend php artisan migrate --force

            # Redémarrage
            docker compose up -d --remove-orphans

            # Optimisations
            sleep 5
            docker compose exec -T backend php artisan config:cache
            docker compose exec -T backend php artisan route:cache
            docker compose exec -T backend php artisan view:cache

            # Nettoyage
            docker image prune -f

            echo "✅ Staging déployé — tag: $IMAGE_TAG — $(date)"

  # ──────────────────────────────────────────────────────────────────
  # JOB 2 — Tests E2E Playwright
  # ──────────────────────────────────────────────────────────────────
  e2e:
    name: "🎭 Tests E2E Playwright"
    runs-on: ubuntu-latest
    needs: deploy-staging
    if: needs.deploy-staging.result == 'success'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: e2e/package-lock.json

      - name: Install Playwright
        working-directory: e2e
        run: npm ci && npx playwright install --with-deps chromium

      - name: Run E2E tests
        working-directory: e2e
        run: npx playwright test
        env:
          BASE_URL: ${{ vars.STAGING_URL }}
          TEST_ADMIN_EMAIL: ${{ secrets.TEST_ADMIN_EMAIL }}
          TEST_ADMIN_PASSWORD: ${{ secrets.TEST_ADMIN_PASSWORD }}
          TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
          TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}

      - name: Upload rapport Playwright
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-${{ env.IMAGE_TAG }}
          path: e2e/playwright-report/
          retention-days: 30

  # ──────────────────────────────────────────────────────────────────
  # JOB 3 — Déploiement Production
  # ──────────────────────────────────────────────────────────────────
  deploy-prod:
    name: "🏁 Déploiement Production OVH"
    runs-on: ubuntu-latest
    needs: [deploy-staging, e2e]
    # prod-only : deploy direct sans passer par staging/e2e
    # both      : deploy après e2e réussi
    if: |
      always() &&
      (
        github.event.inputs.environment == 'prod-only' ||
        (
          (
            github.event.inputs.environment == 'both' ||
            github.event.client_payload.target == 'production'
          ) &&
          needs.e2e.result == 'success'
        )
      )

    environment:
      name: production
      url: ${{ vars.PROD_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Copier fichiers vers VPS prod
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.PROD_SSH_HOST }}
          username: ${{ secrets.PROD_SSH_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          port: ${{ secrets.PROD_SSH_PORT || '22' }}
          source: "docker-compose.yml,docker-compose.prod.yml,nginx/"
          target: "/var/www/gauthierfitness/"

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.PROD_SSH_HOST }}
          username: ${{ secrets.PROD_SSH_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          port: ${{ secrets.PROD_SSH_PORT || 22 }}
          envs: IMAGE_TAG
          script: |
            set -e
            cd /var/www/gauthierfitness

            echo "${{ secrets.GHCR_TOKEN }}" | \
              docker login ghcr.io -u CharlesGAUTHIER1999 --password-stdin

            export IMAGE_TAG=$IMAGE_TAG
            docker compose -f docker-compose.yml -f docker-compose.prod.yml pull

            docker compose exec -T backend php artisan down --retry=5 || true
            docker compose -f docker-compose.yml -f docker-compose.prod.yml \
              run --rm backend php artisan migrate --force
            docker compose -f docker-compose.yml -f docker-compose.prod.yml \
              up -d --remove-orphans

            sleep 8
            docker compose exec -T backend php artisan config:cache
            docker compose exec -T backend php artisan route:cache
            docker compose exec -T backend php artisan view:cache
            docker compose exec -T backend php artisan up

            docker image prune -f
            echo "✅ Production déployée — tag: $IMAGE_TAG — $(date)"
