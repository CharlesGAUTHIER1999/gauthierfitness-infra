# ════════════════════════════════════════════════════════════════════
#  GauthierFitness — Stack complète (images GHCR)
#  repo : CharlesGAUTHIER1999/gauthierfitness-infra
#
#  Usage staging :
#    IMAGE_TAG=develop docker compose -f docker-compose.yml up -d
#  Usage prod :
#    IMAGE_TAG=latest  docker compose -f docker-compose.yml \
#                                     -f docker-compose.prod.yml up -d
# ════════════════════════════════════════════════════════════════════

services:

  # ── Reverse proxy ────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: gf_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - backend_storage:/var/www/html/storage:ro
    depends_on:
      - backend
      - frontend
    networks:
      - gf_network
    restart: unless-stopped

  # ── Backend Laravel (image construite par ci-backend.yml) ────────
  backend:
    image: ghcr.io/charlesgauthier1999/gauthierfitness-backend:${IMAGE_TAG:-latest}
    container_name: gf_backend
    env_file:
      - .env
    volumes:
      - backend_storage:/var/www/html/storage
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - gf_network
    restart: unless-stopped

  # ── Frontend React (image construite par ci-frontend.yml) ────────
  frontend:
    image: ghcr.io/charlesgauthier1999/gauthierfitness-frontend:${IMAGE_TAG:-latest}
    container_name: gf_frontend
    depends_on:
      - backend
    networks:
      - gf_network
    restart: unless-stopped

  # ── MySQL 8 ──────────────────────────────────────────────────────
  db:
    image: mysql:8.0
    container_name: gf_db
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${DB_DATABASE:-gauthier_fitness}
      MYSQL_USER: ${DB_USERNAME:-gauthier}
      MYSQL_PASSWORD: ${DB_PASSWORD:-gauthier_password}
    volumes:
      - db_data:/var/lib/mysql
    # ⚠ Pas de "ports:" ici — MySQL ne doit JAMAIS être exposé à internet.
    # Le backend y accède via le réseau Docker interne (hostname "db").
    # Pour un accès local ponctuel : tunnel SSH (ssh -L 3306:localhost:3306 ...).
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - gf_network
    restart: unless-stopped

  # ── Redis ─────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: gf_redis
    volumes:
      - redis_data:/data
    networks:
      - gf_network
    restart: unless-stopped

  # ── Queue worker ─────────────────────────────────────────────────
  queue:
    image: ghcr.io/charlesgauthier1999/gauthierfitness-backend:${IMAGE_TAG:-latest}
    container_name: gf_queue
    command: ["php", "artisan", "queue:work", "--sleep=3", "--tries=3", "--max-time=3600"]
    env_file:
      - .env
    volumes:
      - backend_storage:/var/www/html/storage
    depends_on:
      db:
        condition: service_healthy
    networks:
      - gf_network
    restart: unless-stopped

  # ══ FUTURS MICROSERVICES (décommenter au besoin) ══════════════════
  # ai-service:
  #   image: ghcr.io/charlesgauthier1999/gauthierfitness-ai:${IMAGE_TAG:-latest}
  #   container_name: gf_ai
  #   networks: [gf_network]

  # 3d-service:
  #   image: ghcr.io/charlesgauthier1999/gauthierfitness-3d:${IMAGE_TAG:-latest}
  #   container_name: gf_3d
  #   networks: [gf_network]

networks:
  gf_network:
    driver: bridge

volumes:
  db_data:
  redis_data:
  backend_storage:
